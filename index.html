<!DOCTYPE html>
<html>
    <head>
        <title>Netflix Page</title>
        <link rel="stylesheet"href="style.css">
    </head>
    <body>
        <section class="hero">
            
            <nav>
                <h1 class="logo">NETFLIX</h1>
                <button class="sign">sign In</button>
            </nav>
            <div class="loginbox">
                <h1>Unlimited movies,Tv shows and more</h1>
                <h2>Starts at ₹ 149.Cancel anytime</h2>
                <p>Ready to watch? Enter your email</p>
                <div class="inputs">
                    <input
                    class="email"
                    type="email"
                    placeholder="Email address"
                    >
                    <input
                    class="password"
                    type="password"
                    placeholder="Password"
                    >
                    <button class="start">Get Started</button>
                </div>
            </div>
        </section>
        <section class="browse">
            <h2>Trending Now</h2>
            <div class="Movies">
                <div class="card">
                    <img src="averagers"alt="movie1">
                </div>
                    <div class="card">
                        <img src="joker"alt="mvie2">
                    </div>
                        <div class="card">
                            <img src="kalki" alt="movie3">
                        </div>
            </div>
        </section>
        <section class="popular">
            <h2>Popular on Netflix</h2>
            <div class="Movies">
                <div class="card">
                    <img src="puspa2"alt="movie4">
                </div>
                    <div class="card">
                        <img src="salaar" alt="movie5">
                    </div>
                        <div class="card">
                            <img src="spider-man" alt="movie6">
                        </div>
             </div>      
        </section>
        <script src="script.js"></script>
    </body>
</html>
